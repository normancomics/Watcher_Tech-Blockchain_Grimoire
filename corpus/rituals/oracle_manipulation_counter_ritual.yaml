blockchain_event_pattern: |
  Oracle manipulation occurs when the price feed or data source a smart contract relies on
  can be temporarily distorted — often via flash loans that move AMM prices within a single
  block, which a naive oracle reads as the true price.

  DEFENSIVE FOCUS: Use TWAP (Time-Weighted Average Price) oracles, Chainlink decentralized
  feeds, or multi-source aggregation to prevent single-block price distortion from affecting
  protocol decisions.
