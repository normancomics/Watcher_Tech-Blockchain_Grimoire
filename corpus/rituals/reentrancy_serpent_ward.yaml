description_extended: |
  ## Symbolic Framework (Lore)

  In the Grimoire's symbolic system, the Reentrancy Serpent corresponds to:

  - **The Ouroboros** — the self-consuming serpent, symbol of recursive infinity
  - **Azazel's weaponsmithing** — the forging of tools (contracts) that turn back on their creators
  - **The Full Moon phase** — maximum visibility, maximum systemic stress

  ## Defensive Ward (Technical)

  The ritual "ward" against the Reentrancy Serpent is:

  ```solidity
  // DEFENSIVE PATTERN — Checks-Effects-Interactions (CEI)
  // 1. CHECKS: validate all conditions first
  require(balance[msg.sender] >= amount, "Insufficient balance");
  // 2. EFFECTS: update state BEFORE external calls
  balance[msg.sender] -= amount;
  // 3. INTERACTIONS: external call LAST
  (bool success, ) = msg.sender.call{value: amount}("");
  require(success, "Transfer failed");
  ```

  Or use OpenZeppelin's `ReentrancyGuard`:

  ```solidity
  import "@openzeppelin/contracts/security/ReentrancyGuard.sol";

  contract MyContract is ReentrancyGuard {
      function withdraw(uint256 amount) external nonReentrant {
          // ... implementation
      }
  }
  ```

  ## Audit Checklist (Defensive)

  - [ ] All state changes occur BEFORE external calls
  - [ ] `nonReentrant` modifier applied to all withdrawal/transfer functions
  - [ ] Pull-over-push payment pattern used where possible
  - [ ] Cross-function reentrancy considered (not just same-function)
