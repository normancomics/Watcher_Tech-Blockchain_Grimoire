description: |
  Azazel is one of the most prominent Watchers in the Enochian tradition, credited with transmitting
  the technologies of metallurgy (weapons, armor), cosmetics (beautifying of eyelids), and the
  knowledge of precious stones and colouring tinctures. In 1 Enoch, he bears primary responsibility
  for corrupting humanity. The Day of Atonement scapegoat ritual (Leviticus 16) sends a goat
  "for Azazel" into the wilderness, interpreted as binding of the spirit of corruption.
attributes:
  role: Transmitter of metallurgy and cosmetics
  domain: Weapons-forging, armor, precious stones, pigments
  punishment: Bound hand and foot, cast into the darkness of Dudael, face covered
  biblical_parallel: Scapegoat / Leviticus 16
blockchain_analogue: |
  Azazel maps to the Flash Loan Cascade archetype — rapid capital mobilization using tools
  (weapons/armor = attack contracts) assembled from transmitted knowledge, deployed in a single
  atomic transaction that exploits the gap between resource availability and guard activation.
  The cosmetics domain parallels address spoofing and token metadata manipulation.
exploit_archetype: flash-loan-cascade
