description: |
  Semjaza (Hebrew: שמיחזה, "my name has seen" or "he sees the name") is identified in 1 Enoch
  as the chief leader of the 200 Watchers who descended upon Mount Hermon. He led the oath-swearing
  ceremony binding all Watchers to their pact of descent and knowledge-transmission.
attributes:
  role: Chief of the Watchers
  descent_location: Mount Hermon
  domain: Enchantments and root-cutting (pharmakeia)
  punishment: Bound beneath the earth until the Day of Judgment
blockchain_analogue: |
  Semjaza corresponds to the Governance Capture archetype — the entity that binds other actors
  through coordinated oath-swearing mirrors multi-sig collusion and governance vote manipulation
  in decentralized protocols.
