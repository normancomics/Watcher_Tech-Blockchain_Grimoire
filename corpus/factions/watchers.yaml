description: |
  The Watchers (Aramaic: ʿIyrין; Hebrew: עִירִין) are a class of divine beings described in
  Second Temple Jewish literature, most extensively in 1 Enoch. A group of 200 Watchers,
  led by Semjaza, swore a binding oath on Mount Hermon and descended to earth, intermarrying
  with human women and transmitting forbidden knowledge to humanity.

  The term "Watcher" (Aramaic: ʿiyr) means "one who is awake" or "guardian" — implying their
  original function was to observe and protect humanity before their transgression.
origin_era: "Antediluvian (pre-Flood, mythological timeline)"
blockchain_analogue: |
  The Watchers as a collective map to the validator/miner network — distributed agents
  who are meant to secure the system (observe/watch) but whose coordinated defection
  (oath-swearing to act outside protocol) creates systemic risk. The 200-strong group
  mirrors threshold collusion scenarios in Byzantine fault-tolerance models.
